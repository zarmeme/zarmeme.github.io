<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zarmeen — Creative Technologist</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: var(--home-bg); color: var(--home-fg); }
    #cur, #cdot { color: var(--home-fg); }

    /* ── CANVAS BG ── */
    #home-cv { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

    /* ── LAYOUT ── */
    .home-wrap { position: relative; z-index: 2; min-height: 100vh;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 3rem 3rem 5rem; pointer-events: none; }

    .home-eyebrow {
      font-size: .72rem; font-weight: 600; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(240,235,226,.3); margin-bottom: 2rem;
      display: flex; align-items: center; gap: .8rem;
    }
    .home-eyebrow::before { content: ''; width: 28px; height: 1px; background: var(--coral); }

    /* Big name — letters repel from cursor */
    .home-name {
      font-family: var(--fd); font-weight: 900; font-style: italic;
      font-size: clamp(5rem, 13vw, 12rem);
      line-height: .9; letter-spacing: -.04em;
      display: flex; flex-wrap: wrap; column-gap: .22em;
    }
    .nc { display: inline-block; transition: transform .5s cubic-bezier(.23,1,.32,1); }

    .home-sub {
      margin-top: 1.8rem; font-size: .82rem; font-weight: 300;
      letter-spacing: .14em; text-transform: uppercase;
      color: rgba(240,235,226,.28);
    }

    /* ── VERTICAL SIDE LINKS ── */
    .home-side {
      position: fixed; right: 3rem; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 1.6rem; z-index: 10;
      pointer-events: all;
    }
    .home-side a {
      font-size: .65rem; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
      color: rgba(240,235,226,.2); writing-mode: vertical-rl;
      text-decoration: none; transition: color .25s;
    }
    .home-side a:hover { color: var(--home-fg); }

    /* ── SCROLL CUE ── */
    .home-scroll {
      position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: .5rem;
      font-size: .65rem; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(240,235,226,.18); z-index: 10; pointer-events: none;
    }
    .scroll-line {
      width: 1px; height: 44px;
      background: linear-gradient(var(--coral), transparent);
      animation: spulse 2s ease-in-out infinite;
    }
    @keyframes spulse { 0%,100%{opacity:.2;} 50%{opacity:1;} }

    @media (max-width: 900px) {
      .home-side { display: none; }
      .home-wrap { padding: 2rem 1.5rem 5rem; }
    }
  </style>
</head>
<body>
  <div id="cur"></div>
  <div id="cdot"></div>
  <canvas id="home-cv"></canvas>

  <!-- NAV -->
  <nav id="nav" style="color:var(--home-fg)">
    <a class="nav-logo" href="index.html" style="color:var(--home-fg)">ZM.</a>
    <div class="nav-links" style="color:var(--home-fg)">
      <a href="work.html">Work</a>
      <a href="about.html">About</a>
      <a href="lab.html">Lab</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <!-- HERO -->
  <div class="home-wrap">
    <div class="home-eyebrow rev">
      Creative Technologist &nbsp;·&nbsp; UX &nbsp;·&nbsp; Interactive Systems &nbsp;·&nbsp; Creative Code
    </div>
    <!-- Letters split for repel effect — JS targets .nc -->
    <div class="home-name rev d1" id="home-name"></div>
    <div class="home-sub rev d2">Available for work &nbsp;·&nbsp; Based wherever ideas are good</div>
  </div>

  <!-- VERTICAL NAV -->
  <div class="home-side">
    <a href="work.html">Work</a>
    <a href="about.html">About</a>
    <a href="lab.html">Lab</a>
    <a href="contact.html">Contact</a>
  </div>

  <div class="home-scroll">
    <div class="scroll-line"></div>
    scroll
  </div>

  <script src="shared.js"></script>
  <script>
    /* ── Split name into repellable letters ── */
    const nameEl = document.getElementById('home-name');
    ['Zarmeen', 'Azmat.'].forEach((word, wi) => {
      const span = document.createElement('span');
      word.split('').forEach(ch => {
        const s = document.createElement('span');
        s.className = 'nc';
        s.textContent = ch;
        span.appendChild(s);
      });
      nameEl.appendChild(span);
      if (wi === 0) nameEl.appendChild(document.createTextNode('\u00A0'));
    });

    /* ── Canvas background ── */
    const canvas = document.getElementById('home-cv');
    const ctx = canvas.getContext('2d');
    let W, H;
    function rz() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    rz(); window.addEventListener('resize', rz);

    const PAL = ['#D4522A','#3D7A5A','#C8861A','#3468A8','#9C4870','#2E9E7C'];
    const orbs = PAL.map((col, i) => ({
      x: .08 + i * .16, y: .2 + (i % 2) * .55,
      r: .12 + i * .022, col, ph: i * 1.3, sp: .003 + i * .0005
    }));
    const trail = []; let pci = 0, t = 0;

    /* paint trail */
    document.addEventListener('mousemove', e => {
      trail.push({ x: e.clientX, y: e.clientY, r: 22 + Math.random() * 20,
        col: PAL[Math.floor(pci / 3) % PAL.length], born: performance.now(), ring: Math.random() > .6 });
      pci++; if (trail.length > 100) trail.splice(0, trail.length - 100);
    });
    document.addEventListener('click', e => {
      for (let i = 0; i < 16; i++) {
        const a = (i / 16) * Math.PI * 2;
        trail.push({ x: e.clientX + Math.cos(a) * Math.random() * 70,
          y: e.clientY + Math.sin(a) * Math.random() * 70,
          r: 10 + Math.random() * 28, col: PAL[Math.floor(Math.random() * PAL.length)],
          born: performance.now() - Math.random() * 200, ring: false });
      }
    });

    /* name repulsion */
    document.addEventListener('mousemove', e => {
      document.querySelectorAll('.nc').forEach(ch => {
        const r = ch.getBoundingClientRect();
        const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
        const dx = e.clientX - cx, dy = e.clientY - cy;
        const d = Math.sqrt(dx * dx + dy * dy), R = 160;
        if (d < R && d > 0.5) {
          const f = (1 - d / R) * 55;
          ch.style.transform = `translate(${-dx/d*f}px,${-dy/d*f}px)`;
        } else ch.style.transform = '';
      });
    });

    /* draw loop */
    (function frame() {
      ctx.fillStyle = '#0C0908'; ctx.fillRect(0, 0, W, H);
      t += .008;
      orbs.forEach(o => {
        const px = o.x * W, py = (o.y + Math.sin(t + o.ph) * .04) * H;
        const pr = o.r * Math.min(W, H) * (1 + Math.sin(t * .7 + o.ph) * .08);
        const g = ctx.createRadialGradient(px, py, 0, px, py, pr);
        g.addColorStop(0, o.col + '1e'); g.addColorStop(1, o.col + '00');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 2); ctx.fill();
      });
      const now = performance.now();
      for (let i = trail.length - 1; i >= 0; i--) {
        const tr = trail[i]; const age = (now - tr.born) / 2400;
        if (age >= 1) { trail.splice(i, 1); continue; }
        const ease = 1 - age * age;
        ctx.save(); ctx.globalAlpha = .5 * ease; ctx.fillStyle = ctx.strokeStyle = tr.col;
        if (tr.ring) { ctx.lineWidth = 2; ctx.globalAlpha = .28 * ease; ctx.beginPath(); ctx.arc(tr.x, tr.y, tr.r * (.4 + age * .6), 0, Math.PI * 2); ctx.stroke(); }
        else { ctx.beginPath(); ctx.arc(tr.x, tr.y, tr.r * ease, 0, Math.PI * 2); ctx.fill(); }
        ctx.restore();
      }
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
